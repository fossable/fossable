    <path id="hash-h1" d="M 14 26 H 34" style="fill:none;stroke:#000000;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" />
    <path id="hash-h2" d="M 14 38 H 34" style="fill:none;stroke:#000000;stroke-width:5;stroke-linecap:round;stroke-linejoin:round" />

    <!-- Bang -->
